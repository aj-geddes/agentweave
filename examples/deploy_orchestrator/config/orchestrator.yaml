agent:
  name: deploy-orchestrator
  version: 1.0.0
  description: "CI/CD Deployment Orchestrator"

identity:
  trust_domain: devops.example
  provider: spiffe
  spire_socket: unix:///run/spire/sockets/agent.sock

authorization:
  provider: opa
  opa_url: http://localhost:8181
  policy_path: ./policies/
  default_action: deny

server:
  host: 0.0.0.0
  port: 8443

transport:
  tls:
    min_version: "1.3"
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout: 30
  retry:
    max_retries: 3
    backoff_base: 1.0

observability:
  metrics:
    enabled: true
    port: 9090
  logging:
    level: INFO
    format: json
  audit:
    enabled: true
