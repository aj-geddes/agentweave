# Customer Support Triage System - Agent Configuration
#
# This configuration defines the triage agent, which classifies incoming
# support tickets and routes them to specialist agents.
#
# Specialist agent SPIFFE IDs:
#   - spiffe://support.example/agent/billing    (billing issues)
#   - spiffe://support.example/agent/technical   (technical issues)
#   - spiffe://support.example/agent/account     (account issues)

agent:
  name: triage
  trust_domain: support.example
  description: "Customer support triage agent - classifies and routes tickets"
  capabilities:
    - name: submit_ticket
      description: "Accept and classify a support ticket, then route to a specialist"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: get_ticket_status
      description: "Check the current status of a submitted ticket"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: get_metrics
      description: "Retrieve triage metrics (total tickets, per-category counts)"
      input_modes: ["application/json"]
      output_modes: ["application/json"]

identity:
  provider: spiffe
  spiffe_endpoint: "unix:///run/spire/sockets/agent.sock"
  allowed_trust_domains:
    - support.example

authorization:
  provider: opa
  opa_endpoint: "http://localhost:8181"
  policy_path: "agentweave/authz"
  default_action: deny
  audit:
    enabled: true
    destinations:
      - stdout

transport:
  tls_min_version: "1.3"
  peer_verification: strict
  connection_pool:
    max_connections: 50
    idle_timeout_seconds: 120
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout_seconds: 15
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 10.0

server:
  host: "0.0.0.0"
  port: 8443
  protocol: a2a

observability:
  metrics:
    enabled: true
    port: 9090
  tracing:
    enabled: true
    exporter: otlp
    endpoint: "http://localhost:4317"
  logging:
    level: INFO
    format: json
