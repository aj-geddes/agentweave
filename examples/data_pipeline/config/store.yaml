# AgentWeave Configuration - Store Agent
# Stage 4: Persists enriched transactions to secure storage
# Only accepts calls from the Enricher agent (chain-of-custody)

agent:
  name: "store"
  trust_domain: "finance.example"
  description: "Persists enriched transactions to secure storage"
  capabilities:
    - name: "store"
      description: "Persist enriched transactions to storage"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: "query"
      description: "Query stored transactions"
      input_modes: ["application/json"]
      output_modes: ["application/json"]

identity:
  provider: "spiffe"
  spiffe_endpoint: "unix:///run/spire/sockets/agent.sock"
  allowed_trust_domains:
    - "finance.example"

authorization:
  provider: "opa"
  opa_endpoint: "http://opa:8181"
  policy_path: "agentweave/authz"
  default_action: "deny"
  audit:
    enabled: true
    destination: "file:///var/log/agentweave/store-audit.log"

transport:
  tls_min_version: "1.3"
  peer_verification: "strict"
  connection_pool:
    max_connections: 50
    idle_timeout_seconds: 60
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 30
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 30.0

server:
  host: "0.0.0.0"
  port: 8446
  protocol: "a2a"

observability:
  metrics:
    enabled: true
    port: 9093
  tracing:
    enabled: true
    exporter: "otlp"
    endpoint: "http://otel-collector:4317"
  logging:
    level: "INFO"
    format: "json"
