# AgentWeave Configuration - Enricher Agent
# Stage 3: Enriches transactions with additional metadata
# Only accepts calls from the Validator agent (chain-of-custody)

agent:
  name: "enricher"
  trust_domain: "finance.example"
  description: "Enriches transactions with account metadata"
  capabilities:
    - name: "enrich"
      description: "Enrich transactions with account metadata"
      input_modes: ["application/json"]
      output_modes: ["application/json"]

identity:
  provider: "spiffe"
  spiffe_endpoint: "unix:///run/spire/sockets/agent.sock"
  allowed_trust_domains:
    - "finance.example"

authorization:
  provider: "opa"
  opa_endpoint: "http://opa:8181"
  policy_path: "agentweave/authz"
  default_action: "deny"
  audit:
    enabled: true
    destination: "file:///var/log/agentweave/enricher-audit.log"

transport:
  tls_min_version: "1.3"
  peer_verification: "strict"
  connection_pool:
    max_connections: 100
    idle_timeout_seconds: 60
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 30
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 30.0

server:
  host: "0.0.0.0"
  port: 8445
  protocol: "a2a"

observability:
  metrics:
    enabled: true
    port: 9092
  tracing:
    enabled: true
    exporter: "otlp"
    endpoint: "http://otel-collector:4317"
  logging:
    level: "INFO"
    format: "json"
