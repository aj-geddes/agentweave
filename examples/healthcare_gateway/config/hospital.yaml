agent:
  name: records
  trust_domain: hospital.health
  description: "HIPAA-Compliant Hospital Records Agent"
  capabilities:
    - name: lookup_patient
      description: "Look up a patient by ID (hospital internal only)"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: get_records
      description: "Get patient records by type (hospital internal only)"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: get_claim_data
      description: "Get filtered patient data for insurance claim processing"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: audit_report
      description: "Generate HIPAA audit report (compliance officers only)"
      input_modes: ["application/json"]
      output_modes: ["application/json"]

identity:
  provider: spiffe
  spiffe_endpoint: "unix:///run/spire/sockets/agent.sock"
  allowed_trust_domains:
    - hospital.health
    - insurance.health  # Federation with insurance domain

authorization:
  provider: opa
  opa_endpoint: "http://localhost:8181"
  policy_path: "agentweave/authz"
  default_action: deny
  audit:
    enabled: true
    destination: "file:///var/log/agentweave/hospital-audit.log"

transport:
  tls_min_version: "1.3"
  peer_verification: strict
  connection_pool:
    max_connections: 50
    idle_timeout_seconds: 120
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout_seconds: 15
  retry:
    max_attempts: 3
    backoff_base_seconds: 1.0
    backoff_max_seconds: 10.0

server:
  host: "0.0.0.0"
  port: 8443
  protocol: a2a

observability:
  metrics:
    enabled: true
    port: 9090
  tracing:
    enabled: true
    exporter: otlp
    endpoint: "http://localhost:4317"
  logging:
    level: INFO
    format: json
