agent:
  name: knowledge-base
  trust_domain: research.example
  description: "Secure RAG Knowledge Base Agent"
  capabilities:
    - name: search
      description: "Search documents in the knowledge base"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: index
      description: "Index a new document (admin only)"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: summarize
      description: "Summarize a specific document"
      input_modes: ["application/json"]
      output_modes: ["application/json"]
    - name: stats
      description: "Get knowledge base statistics"
      input_modes: ["application/json"]
      output_modes: ["application/json"]

identity:
  provider: spiffe
  spiffe_endpoint: "unix:///run/spire/sockets/agent.sock"
  allowed_trust_domains:
    - research.example

authorization:
  provider: opa
  opa_endpoint: "http://localhost:8181"
  policy_path: "agentweave/authz"
  default_action: deny
  audit:
    enabled: true
    destinations:
      - stdout

transport:
  tls_min_version: "1.3"
  peer_verification: strict
  connection_pool:
    max_connections: 20
    idle_timeout_seconds: 120
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout_seconds: 15

server:
  host: "0.0.0.0"
  port: 8443

observability:
  metrics:
    enabled: true
    port: 9090
  tracing:
    enabled: true
    exporter: otlp
    endpoint: "http://localhost:4318"
  logging:
    level: INFO
    format: json
